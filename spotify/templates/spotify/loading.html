<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Syncing your Spotify data...</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #121212;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 32px;
    }

    .bars {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 48px;
    }

    .bar {
      width: 8px;
      background: #1DB954;
      border-radius: 4px;
      animation: bounce 1.2s ease-in-out infinite;
    }

    .bar:nth-child(1) { animation-delay: 0s;    height: 24px; }
    .bar:nth-child(2) { animation-delay: 0.15s; height: 36px; }
    .bar:nth-child(3) { animation-delay: 0.3s;  height: 48px; }
    .bar:nth-child(4) { animation-delay: 0.45s; height: 36px; }
    .bar:nth-child(5) { animation-delay: 0.6s;  height: 24px; }

    @keyframes bounce {
      0%, 100% { transform: scaleY(0.4); opacity: 0.6; }
      50%       { transform: scaleY(1);   opacity: 1; }
    }

    h1 { font-size: 1.4rem; font-weight: 600; }

    p {
      font-size: 0.9rem;
      color: #aaa;
      text-align: center;
      max-width: 320px;
      line-height: 1.6;
    }

    .error {
      display: none;
      background: #2a1a1a;
      border: 1px solid #c0392b;
      color: #e74c3c;
      padding: 16px 24px;
      border-radius: 8px;
      text-align: center;
      max-width: 360px;
    }

    .error button {
      margin-top: 12px;
      background: #1DB954;
      color: #000;
      border: none;
      padding: 8px 20px;
      border-radius: 20px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="bars">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>

  <h1>Syncing your Spotify data</h1>
  <p>Fetching your top tracks, artists, and listening history. This may take a minute.</p>

  <div class="error" id="error-box">
    <strong>Sync failed</strong>
    <p id="error-msg"></p>
    <button onclick="startSync()">Try again</button>
  </div>

  <script>
    let started = false;

    function startSync() {
      document.getElementById('error-box').style.display = 'none';
      fetch('/api/start-sync/', { method: 'GET' })
        .then(r => r.json())
        .then(data => {
          if (data.error) showError(data.error);
          else poll();
        })
        .catch(() => showError('Could not start sync.'));
    }

    function poll() {
      setTimeout(() => {
        fetch('/api/sync-status/')
          .then(r => r.json())
          .then(data => {
            if (data.error) {
              showError(data.error);
            } else if (data.done) {
              window.location.href = '/';
            } else {
              poll();
            }
          })
          .catch(() => poll());
      }, 2000);
    }

    function showError(msg) {
      document.getElementById('error-msg').textContent = msg;
      document.getElementById('error-box').style.display = 'block';
    }

    startSync();
  </script>

</body>
</html>
